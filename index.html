<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>SwimMatch · 你的成绩能游进哪所美国大学?</title>
<style>
:root{
  --bg:#f4f8fb; --card:#ffffff; --ink:#0f2740; --sub:#5b7186; --line:#dde8f0;
  --blue:#0a6ebd; --aqua:#00a8cc; --safety:#1a9e6c; --match:#0a6ebd; --reach:#e08a00; --far:#98a8b5;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--ink);line-height:1.55}
.wrap{max-width:880px;margin:0 auto;padding:20px 16px 60px}
header{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:6px}
.logo{font-size:26px;font-weight:800;letter-spacing:-.5px}
.logo span{background:linear-gradient(90deg,var(--blue),var(--aqua));-webkit-background-clip:text;background-clip:text;color:transparent}
.beta{font-size:11px;font-weight:700;color:#fff;background:var(--aqua);border-radius:20px;padding:2px 9px;vertical-align:middle;margin-left:6px}
.langbtn{border:1px solid var(--line);background:var(--card);border-radius:20px;padding:5px 14px;font-size:13px;cursor:pointer;color:var(--sub)}
.tagline{color:var(--sub);font-size:15px;margin:2px 0 20px}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px;margin-bottom:16px;box-shadow:0 1px 3px rgba(15,39,64,.04)}
h2{font-size:16px;margin-bottom:14px}
.seg{display:inline-flex;border:1px solid var(--line);border-radius:10px;overflow:hidden}
.seg button{border:0;background:transparent;padding:8px 18px;font-size:14px;cursor:pointer;color:var(--sub)}
.seg button.on{background:var(--blue);color:#fff;font-weight:600}
.row{display:flex;gap:24px;flex-wrap:wrap;margin-bottom:16px}
.field label{display:block;font-size:12px;color:var(--sub);margin-bottom:6px;font-weight:600}
.events{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.ev{display:flex;flex-direction:column}
.ev label{font-size:12px;color:var(--sub);margin-bottom:3px}
.ev input{border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-size:15px;width:100%;font-variant-numeric:tabular-nums}
.ev input:focus{outline:2px solid var(--aqua);border-color:transparent}
.ev input.bad{outline:2px solid #d94f4f}
.go{margin-top:18px;width:100%;border:0;border-radius:10px;padding:13px;font-size:16px;font-weight:700;color:#fff;background:linear-gradient(90deg,var(--blue),var(--aqua));cursor:pointer}
.go:active{opacity:.85}
.hint{font-size:12px;color:var(--sub);margin-top:8px}
.summary{display:flex;gap:14px;flex-wrap:wrap}
.stat{flex:1;min-width:130px;background:var(--bg);border-radius:10px;padding:12px 14px}
.stat .v{font-size:22px;font-weight:800;font-variant-numeric:tabular-nums}
.stat .k{font-size:12px;color:var(--sub)}
.tier-h{display:flex;align-items:center;gap:8px;margin:22px 0 10px;font-size:15px;font-weight:800}
.tier-h .dot{width:10px;height:10px;border-radius:50%}
.tier-h .cnt{font-weight:600;color:var(--sub);font-size:13px}
.school{background:var(--card);border:1px solid var(--line);border-left:4px solid var(--far);border-radius:12px;padding:14px 16px;margin-bottom:10px}
.school .top{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
.school .nm{font-size:16px;font-weight:800}
.badge{font-size:11px;font-weight:700;border-radius:6px;padding:1px 7px;background:var(--bg);color:var(--sub)}
.badge.d1{background:#e7f0fa;color:var(--blue)}
.badge.d3{background:#eaf7f1;color:var(--safety)}
.pos{font-size:13px;color:var(--sub);margin-top:4px}
.pos b{color:var(--ink)}
.strip{position:relative;height:26px;margin:10px 0 2px;background:var(--bg);border-radius:6px}
.strip .pt{position:absolute;top:9px;width:7px;height:7px;border-radius:50%;background:#b9cddd;transform:translateX(-50%)}
.strip .me{position:absolute;top:3px;width:3px;height:19px;border-radius:2px;background:var(--aqua);transform:translateX(-50%)}
.striplbl{display:flex;justify-content:space-between;font-size:11px;color:var(--sub);margin-bottom:6px}
.evcmp{font-size:12.5px;color:var(--sub);margin-top:6px;font-variant-numeric:tabular-nums}
.evcmp .ok{color:var(--safety);font-weight:700}
.evcmp .no{color:var(--reach);font-weight:700}
.small{font-size:11px;color:var(--far)}
.needline{font-size:12.5px;margin-top:8px;padding:7px 10px;border-radius:8px;background:var(--bg);color:var(--sub)}
.needline b{color:var(--ink)}
.needline.hit{background:#eaf7f1;color:#14683f}
.needline.hit b{color:#0e5232}
.needtag{display:inline-block;font-size:11px;font-weight:700;border-radius:6px;padding:1px 7px;margin-left:6px;background:#1a9e6c;color:#fff}
.ovwrap{overflow-x:auto}
.ovtable{width:100%;border-collapse:collapse;font-size:13px}
.ovtable th{text-align:left;font-size:11.5px;color:var(--sub);padding:6px 8px;border-bottom:1px solid var(--line);white-space:nowrap}
.ovtable td{padding:7px 8px;border-bottom:1px solid var(--line);vertical-align:top}
.ovtable .sm{font-size:11px;color:var(--far);white-space:nowrap}
.grp{display:inline-block;font-size:11.5px;border-radius:6px;padding:1px 7px;margin:1px 3px 1px 0;background:#e7f0fa;color:var(--blue);font-weight:600;white-space:nowrap}
.grp.hot{background:#fdeeda;color:#b56a00}
.note{font-size:12px;color:var(--sub);background:#fdf6e8;border:1px solid #f2e3bd;border-radius:10px;padding:10px 14px;margin:14px 0}
footer{margin-top:28px;font-size:12px;color:var(--far);line-height:1.7}
.hide{display:none}
@media (max-width:520px){.events{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="wrap">
<header>
  <div class="logo"><span>Swim</span>Match<span class="beta">FREE BETA</span></div>
  <button class="langbtn" id="langbtn" onclick="toggleLang()">English</button>
</header>
<p class="tagline" id="tagline">输入你的比赛成绩,对比美国大学 2026 级新生的真实水平,看看你处于哪些学校的成绩区间。仅成绩维度参考,不构成录取预测。</p>

<div class="card">
  <h2 id="f-title">你的成绩</h2>
  <div class="row">
    <div class="field"><label id="f-gender">性别</label>
      <div class="seg" id="genderSeg">
        <button data-v="M" class="on">男 Men</button><button data-v="W">女 Women</button>
      </div>
    </div>
    <div class="field"><label id="f-course">泳池 / 成绩类型</label>
      <div class="seg" id="courseSeg">
        <button data-v="LCM" class="on">长池 50m</button><button data-v="SCM">短池 25m</button><button data-v="SCY">短码 25y</button>
      </div>
    </div>
    <div class="field"><label id="f-grad">高中毕业年份(届)</label>
      <div class="seg" id="gradSeg">
        <button data-v="2027">2027</button><button data-v="2028" class="on">2028</button><button data-v="2029">2029</button><button data-v="2030">2030</button>
      </div>
    </div>
  </div>
  <div class="field"><label id="f-events">填写你有的项目即可(格式如 26.66 或 2:21.50)</label></div>
  <div class="events" id="events"></div>
  <button class="go" id="gobtn" onclick="run()">生成匹配报告 →</button>
  <div class="hint" id="f-hint">中国选手直接填长池米成绩即可,系统自动与美国短码成绩换算对比。</div>
</div>

<div id="results" class="hide">
  <div class="card">
    <h2 id="r-title">你的水平概览</h2>
    <div class="summary" id="summary"></div>
    <div class="note" id="r-note"></div>
  </div>
  <div id="tiers"></div>
</div>

<div class="card" id="needsCard">
  <h2 id="n-title">2027–2030 各校招募重点预测</h2>
  <p class="hint" id="n-desc" style="margin:0 0 12px"></p>
  <div class="ovwrap" id="overview"></div>
  <div class="small" id="n-note" style="margin-top:10px"></div>
</div>

<footer id="foot"></footer>
</div>

<script>
const I18N = {
  zh: {
    tagline:"输入你的比赛成绩,对比美国大学 2026 级新生的真实水平,看看你处于哪些学校的成绩区间。仅成绩维度参考,不构成录取预测。",
    fTitle:"你的成绩", gender:"性别", course:"泳池 / 成绩类型",
    events:"填写你有的项目即可(格式如 26.66 或 2:21.50)",
    go:"生成匹配报告 →",
    hint:"中国选手直接填长池米成绩即可,系统自动与美国短码成绩换算对比。",
    rTitle:"你的水平概览",
    bestPts:"最强项积分", bestEv:"最强项目", scyEq:"换算短码成绩", nEv:"已填项目",
    note:"积分为 SwimCloud 同口径积分(1000 分 = 世界纪录),用于跨泳池、跨项目统一比较。以下对比基于 33 所大学 2026 级新生的公开成绩聚合统计。",
    disclaimer:"⚠️ 重要:本报告不是录取预测。「成绩」对比只说明你进入了该校新生的成绩区间;「招募重点预测」只是根据公开锦标赛阵容年级构成做的推算,不代表教练的实际招募计划。实际招募还取决于名额、学业成绩(GPA/标化)、联系教练的时机等诸多因素。",
    fewEv:(n)=>`你只填了 ${n} 个项目。多填几项(尤其是你的主项)对比才有意义——大学教练看的是你的强项组合,不是单项。`,
    tiers:{safety:"成绩领先",match:"成绩相当",reach:"接近区间",far:"尚有差距"},
    tierDesc:{safety:"仅成绩维度:你的最强项积分高于该校 2026 级新生的中位水平",match:"仅成绩维度:进入该校新生成绩区间(前 75%)",reach:"仅成绩维度:略低于该校新生区间,差距在约 1% 以内",far:"仅成绩维度:与该校新生成绩差距较明显"},
    lowNTier:"样本不足,不作判断",
    lowNDesc:"该校有成绩的新生样本少于 4 人,数据不足以支持任何对比结论",
    pos:(a,b)=>`最强项积分高于该校 <b>${a}/${b}</b> 名 2026 级新生(仅成绩对比)`,
    roster:(n)=>`新生样本 ${n} 人`,
    lowN:"样本较少,仅供参考",
    you:"你",
    slowest:"最慢新生",fastest:"最快新生",
    evYou:"你", evRange:"该校新生",
    evNote:"※ 对比区间来自该校新生各自最强 5 项的成绩,他们的主项和泳姿分布可能与你不同。",
    noSchool:"暂无匹配学校 —— 试试多填几个项目,或检查成绩格式。",
    empty:"请至少填写一个项目的成绩。",
    badTime:"有成绩格式不对(红框),请用 26.66 或 2:21.50 格式。",
    grad:"高中毕业年份(届)",
    nTitle:"2027–2030 各校招募重点预测",
    nDesc:"根据各校现役主力(2026 赛季锦标赛阵容)的年级构成推算:某届高中生入学时,恰好要填补当年毕业主力留下的泳姿空缺。下表为所选性别、所选毕业届的预测。",
    nNote:"数据:2026 NCAA D1 / D3 锦标赛与藤校联赛成绩(选手年级×项目),2030 届基于该校 2026 级新生构成推算。「流失」= 该届毕业的主力人数(按项目分摊)。样本仅含锦标赛级选手,不含全部队员;仅供参考,不代表教练实际招募计划。",
    nFocus:(y)=>`预测 ${y} 届招募重点`,
    nLeave:(x)=>`流失 ${x} 人`,
    nMatch:"与你的主项匹配",
    nWeak:"该届你的主项预测需求较低",
    nFew:"该届毕业流失少,新人名额可能有限",
    nNoData:"招募需求数据不足",
    nSample:(n)=>`主力样本 ${n} 人`,
    nEst:"推算",
    nSchool:"学校", nSampleH:"样本", nFocusH:"预测招募重点(按流失人数排序)",
    groups:{"FR-SP":"短距自由(50/100)","FR-MID":"中距自由(200/500)","FR-DIST":"长距自由(1000/1650)","BK":"仰泳","BR":"蛙泳","FL":"蝶泳","IM":"混合泳"},
    foot:"数据说明:成绩对比基于 SwimSwam 2026 届招募数据库与 SwimCloud 公开成绩的聚合统计;招募重点预测基于 2026 NCAA D1/D3 锦标赛及藤校联赛公开成绩的年级×项目聚合。站点不含任何选手个人信息,换算与积分为估算值。本站仅提供参考对比,不构成录取预测或建议,不代表任何学校官方招募标准。© 2026 SwimMatch · Beta 免费公测中",
    lang:"English"
  },
  en: {
    tagline:"Enter your race times and see where you stand against real class-of-2026 college recruits. A times-only reference — not a recruiting prediction.",
    fTitle:"Your Times", gender:"Gender", course:"Pool / time type",
    events:"Fill in the events you have (e.g. 26.66 or 2:21.50)",
    go:"Get My Match Report →",
    hint:"International swimmers: just enter LCM times — we convert to U.S. short-course yards automatically.",
    rTitle:"Your Profile",
    bestPts:"Best event points", bestEv:"Best event", scyEq:"SCY equivalent", nEv:"Events entered",
    note:"Points follow SwimCloud's scale (1000 = world record) for cross-pool, cross-event comparison. Comparisons below are based on aggregate stats of class-of-2026 recruits at 33 colleges.",
    disclaimer:"⚠️ Important: this report is not a recruiting prediction. The times comparison only shows you are within a school's recruit time range; the \"recruiting focus\" prediction is only an estimate from public championship-lineup class data, not any coach's actual plan. Real recruiting also depends on roster spots, academics (GPA / test scores), and when you contact coaches.",
    fewEv:(n)=>`You entered only ${n} event${n>1?"s":""}. Add more (especially your main events) — coaches evaluate your event lineup, not a single swim.`,
    tiers:{safety:"Times Ahead",match:"Times In Range",reach:"Times Close",far:"Times Behind"},
    tierDesc:{safety:"Times only: your best-event points beat this school's median 2026 recruit",match:"Times only: inside this school's recruit range (top 75%)",reach:"Times only: just below their range — within about 1%",far:"Times only: well behind this school's recruit times"},
    lowNTier:"Not Enough Data",
    lowNDesc:"Fewer than 4 recruits with times — too small a sample for any conclusion",
    pos:(a,b)=>`Best-event points ahead of <b>${a}/${b}</b> of their 2026 recruits (times only)`,
    roster:(n)=>`${n} recruits sampled`,
    lowN:"small sample — indicative only",
    you:"You",
    slowest:"slowest recruit",fastest:"fastest recruit",
    evYou:"You", evRange:"their recruits",
    evNote:"※ Ranges come from each recruit's own top-5 events — their specialties may differ from yours.",
    noSchool:"No matches yet — try entering more events or check time formats.",
    empty:"Please enter at least one time.",
    badTime:"Some times are invalid (red) — use formats like 26.66 or 2:21.50.",
    grad:"HS graduation year",
    nTitle:"2027–2030 Predicted Recruiting Focus by School",
    nDesc:"Based on the class-year makeup of each team's 2026 championship lineup: an incoming HS class arrives just as that year's graduating seniors leave, so teams recruit to fill those stroke gaps. Table shows the selected gender and HS class.",
    nNote:"Data: 2026 NCAA D1 / D3 Championships and Ivy League Championships (swimmer class year × events); class of 2030 estimated from each school's 2026 incoming recruits. \"Leaving\" = championship-level swimmers graduating that spring (weighted by event). Sample covers championship swimmers only — an indicative signal, not a coach's actual recruiting plan.",
    nFocus:(y)=>`Predicted class-of-${y} recruiting focus`,
    nLeave:(x)=>`${x} leaving`,
    nMatch:"matches your main stroke",
    nWeak:"low predicted need for your main stroke this class",
    nFew:"few departures that year — roster spots may be limited",
    nNoData:"not enough roster data",
    nSample:(n)=>`${n} championship swimmers`,
    nEst:"estimated",
    nSchool:"School", nSampleH:"Sample", nFocusH:"Predicted focus (by departures)",
    groups:{"FR-SP":"Sprint Free (50/100)","FR-MID":"Mid Free (200/500)","FR-DIST":"Distance Free (1000/1650)","BK":"Backstroke","BR":"Breaststroke","FL":"Butterfly","IM":"IM"},
    foot:"Data: times comparison from aggregate statistics of the SwimSwam class-of-2026 recruiting database and public SwimCloud times; recruiting-focus predictions from class-year × event aggregates of public 2026 NCAA D1/D3 and Ivy League championship results. No individual swimmer data is shown. Conversions and points are estimates. This site is a reference tool — not a recruiting prediction or advice, and does not represent any school's official standards. © 2026 SwimMatch · Free Beta",
    lang:"中文"
  }
};
const EVENTS = {
  SCY:["50 Free","100 Free","200 Free","500 Free","1000 Free","1650 Free","100 Back","200 Back","100 Breast","200 Breast","100 Fly","200 Fly","200 IM","400 IM"],
  LCM:["50 Free","100 Free","200 Free","400 Free","800 Free","1500 Free","50 Back","100 Back","200 Back","50 Breast","100 Breast","200 Breast","50 Fly","100 Fly","200 Fly","200 IM","400 IM"]
};
EVENTS.SCM = EVENTS.LCM;
const EV_ZH = {"Free":"自由泳","Back":"仰泳","Breast":"蛙泳","Fly":"蝶泳","IM":"混合泳"};
const LCM_TO_SCY_EV = {"400 Free":"500 Free","800 Free":"1000 Free","1500 Free":"1650 Free"};
const SCM_FACTOR = 0.966;           // SCM base ≈ LCM base × 0.966 (short-course speed gain)
const REACH_PTS = 30;               // "close": within ~1.2% below the in-range cutoff
const MIN_N = 4;                    // rosters smaller than this get no tier judgment
let LANG = navigator.language && navigator.language.startsWith("zh") ? "zh" : "en";
let STATS = null, NEEDS = null;
let gender = "M", course = "LCM", gradYear = "2028";

function eventGroup(ev){
  const m = ev.match(/^(\d+)\s+(Free|Back|Breast|Fly|IM)$/);
  if(!m) return null;
  let d = parseInt(m[1]);
  if(m[2]==="Free"){
    d = {400:500, 800:1000, 1500:1650}[d] || d;
    return d<=100 ? "FR-SP" : d<=500 ? "FR-MID" : "FR-DIST";
  }
  return {Back:"BK",Breast:"BR",Fly:"FL",IM:"IM"}[m[2]];
}

function T(){ return I18N[LANG]; }
function evLabel(ev){
  if(LANG==="en") return ev;
  const [d,s] = [ev.split(" ")[0], ev.split(" ").slice(1).join(" ")];
  const unit = course==="SCY" ? "码" : "米";
  return `${d}${unit}${EV_ZH[s]||s}`;
}
function applyLang(){
  const t = T();
  document.getElementById("tagline").textContent = t.tagline;
  document.getElementById("f-title").textContent = t.fTitle;
  document.getElementById("f-gender").textContent = t.gender;
  document.getElementById("f-course").textContent = t.course;
  document.getElementById("f-events").textContent = t.events;
  document.getElementById("gobtn").textContent = t.go;
  document.getElementById("f-hint").textContent = t.hint;
  document.getElementById("r-title").textContent = t.rTitle;
  document.getElementById("r-note").textContent = t.note;
  document.getElementById("foot").textContent = t.foot;
  document.getElementById("langbtn").textContent = t.lang;
  document.getElementById("f-grad").textContent = t.grad;
  document.getElementById("n-title").textContent = t.nTitle;
  document.getElementById("n-desc").textContent = t.nDesc;
  document.getElementById("n-note").textContent = t.nNote;
  renderEvents();
  renderOverview();
}
function toggleLang(){ LANG = LANG==="zh"?"en":"zh"; applyLang(); if(!document.getElementById("results").classList.contains("hide")) run(); }

function seg(id, cb){
  const el = document.getElementById(id);
  el.querySelectorAll("button").forEach(b=>b.onclick=()=>{
    el.querySelectorAll("button").forEach(x=>x.classList.remove("on"));
    b.classList.add("on"); cb(b.dataset.v);
  });
}
seg("genderSeg", v=>{ gender=v; renderOverview(); });
seg("gradSeg", v=>{ gradYear=v; renderOverview(); if(!document.getElementById("results").classList.contains("hide")) run(); });
seg("courseSeg", v=>{
  const old = {};
  EVENTS[course].forEach(ev=>{ const i=document.getElementById("in-"+ev.replace(/ /g,"_")); if(i&&i.value) old[ev]=i.value; });
  course=v; renderEvents();
  EVENTS[course].forEach(ev=>{ const i=document.getElementById("in-"+ev.replace(/ /g,"_")); if(i&&old[ev]) i.value=old[ev]; });
});

function renderEvents(){
  const box = document.getElementById("events");
  const old = {};
  box.querySelectorAll("input").forEach(i=>{ if(i.value) old[i.dataset.ev]=i.value; });
  box.innerHTML = "";
  EVENTS[course].forEach(ev=>{
    const d = document.createElement("div"); d.className="ev";
    const id = "in-"+ev.replace(/ /g,"_");
    d.innerHTML = `<label for="${id}">${evLabel(ev)}</label><input id="${id}" data-ev="${ev}" inputmode="decimal" placeholder="--" value="${old[ev]||""}">`;
    box.appendChild(d);
  });
}

function parseTime(s){
  s = s.trim().replace(/[,,::']/g,":");
  if(!s) return null;
  const m = s.match(/^(?:(\d+):)?(\d{1,2}(?:\.\d+)?)$/);
  if(!m) return NaN;
  const v = (m[1]?parseInt(m[1])*60:0) + parseFloat(m[2]);
  return v>0 ? v : NaN;
}
function fmtTime(t){
  if(t>=60){ const m=Math.floor(t/60); return m+":"+ (t-m*60).toFixed(2).padStart(5,"0"); }
  return t.toFixed(2);
}

function computePoints(ev, tsec){
  const b = STATS.pointBases[gender+"|"+ev];
  if(!b) return null;
  let base;
  if(course==="SCY") base = b.scy;
  else if(course==="LCM") base = b.lcm;
  else base = b.lcm * SCM_FACTOR;
  if(!base) return null;
  return 1000 * Math.pow(base/tsec, 3);
}
function scyEquiv(ev, pts){
  const scyEv = LCM_TO_SCY_EV[ev] || ev;
  const b = STATS.pointBases[gender+"|"+scyEv];
  if(!b || !b.scy) return null;
  return { ev: scyEv, t: b.scy * Math.pow(1000/pts, 1/3) };
}

// ---- recruiting-needs helpers ----
const MIN_NEED = 0.3;   // ignore fractional departures below this
const HOT_NEED = 1.0;   // "focus" threshold: ≥1 swimmer-equivalent leaving
function needRows(schoolName){
  const nd = NEEDS && NEEDS.schools[schoolName] && NEEDS.schools[schoolName][gender];
  if(!nd) return null;
  const by = nd.byYear[gradYear];
  if(by===undefined && nd.n===0) return null;
  const rows = Object.entries(by||{})
    .map(([grp,L])=>({grp, L, T:Math.max(nd.total[grp]||0, L)}))
    .filter(r=>r.L>=MIN_NEED)
    .sort((a,b)=>b.L-a.L);
  return {n:nd.n, rows, est:gradYear==="2030"};
}
function grpTag(r, hot){
  const t = T();
  return `<span class="grp${hot?" hot":""}">${t.groups[r.grp]||r.grp} · ${t.nLeave(r.L.toFixed(1))}</span>`;
}
function userMainGroups(entries){
  const gs = [];
  entries.forEach(e=>{ const g=eventGroup(e.ev); if(g && !gs.includes(g)) gs.push(g); });
  return gs.slice(0,2);   // groups of the user's two strongest events
}
function needLineHTML(schoolName, myGroups){
  const t = T();
  const nd = needRows(schoolName);
  if(!nd || (nd.n===0 && !nd.rows.length))
    return `<div class="needline">${t.nFocus(gradYear)}: ${t.nNoData}</div>`;
  const est = nd.est ? ` <span class="small">(${t.nEst})</span>` : "";
  if(!nd.rows.length)
    return `<div class="needline">${t.nFocus(gradYear)}${est}: ${t.nFew} · <span class="small">${t.nSample(nd.n)}</span></div>`;
  const top = nd.rows.slice(0,3);
  const hit = top.some(r=>r.L>=HOT_NEED && myGroups.includes(r.grp));
  const tags = top.map(r=>grpTag(r, r.L>=HOT_NEED)).join(" ");
  const badge = hit ? `<span class="needtag">✓ ${t.nMatch}</span>`
    : (nd.rows.every(r=>!myGroups.includes(r.grp)) ? ` <span class="small">· ${t.nWeak}</span>` : "");
  return `<div class="needline${hit?" hit":""}"><b>${t.nFocus(gradYear)}</b>${est}: ${tags}${badge} <span class="small">· ${t.nSample(nd.n)}</span></div>`;
}
function renderOverview(){
  const box = document.getElementById("overview");
  if(!box) return;
  const t = T();
  if(!NEEDS || !STATS){ box.innerHTML=""; return; }
  let rows = "";
  STATS.schools.forEach(s=>{
    if(!s.rosters[gender]) return;
    const nd = needRows(s.name);
    let cell;
    if(!nd || (nd.n===0 && !nd.rows.length)) cell = `<span class="sm">${t.nNoData}</span>`;
    else if(!nd.rows.length) cell = `<span class="sm">${t.nFew}</span>`;
    else cell = nd.rows.slice(0,3).map(r=>grpTag(r, r.L>=HOT_NEED)).join(" ") + (nd.est?` <span class="sm">(${t.nEst})</span>`:"");
    const n = nd ? nd.n : 0;
    rows += `<tr><td><b>${s.name}</b> <span class="sm">${s.div}</span></td><td>${cell}</td><td class="sm">${n||"–"}</td></tr>`;
  });
  box.innerHTML = `<table class="ovtable"><thead><tr><th>${t.nSchool}</th><th>${t.nFocusH} · ${gradYear}</th><th>${t.nSampleH}</th></tr></thead><tbody>${rows}</tbody></table>`;
}

function run(){
  const t = T();
  const entries = [];
  let bad = false;
  document.querySelectorAll("#events input").forEach(i=>{
    i.classList.remove("bad");
    if(!i.value.trim()) return;
    const sec = parseTime(i.value);
    if(isNaN(sec) || sec===null){ i.classList.add("bad"); bad=true; return; }
    const pts = computePoints(i.dataset.ev, sec);
    if(pts) entries.push({ev:i.dataset.ev, sec, pts});
  });
  if(bad){ alert(t.badTime); return; }
  if(!entries.length){ alert(t.empty); return; }

  entries.sort((a,b)=>b.pts-a.pts);
  const myGroups = userMainGroups(entries);
  const best = entries[0];
  const eq = scyEquiv(best.ev, best.pts);
  const P = best.pts;

  document.getElementById("summary").innerHTML = `
    <div class="stat"><div class="v">${Math.round(P)}</div><div class="k">${t.bestPts}</div></div>
    <div class="stat"><div class="v" style="font-size:17px">${evLabel(best.ev)} ${fmtTime(best.sec)}</div><div class="k">${t.bestEv}</div></div>
    ${eq?`<div class="stat"><div class="v" style="font-size:17px">${eq.ev} ${fmtTime(eq.t)}</div><div class="k">${t.scyEq}</div></div>`:""}
    <div class="stat"><div class="v">${entries.length}</div><div class="k">${t.nEv}</div></div>`;

  // classify schools — quantile-based, robust to a single stray roster point
  const quantile = (sorted, q) => {
    const pos = (sorted.length - 1) * q, lo = Math.floor(pos);
    return lo + 1 < sorted.length ? sorted[lo] + (sorted[lo+1] - sorted[lo]) * (pos - lo) : sorted[lo];
  };
  const tiers = {safety:[],match:[],reach:[],far:[],lown:[]};
  STATS.schools.forEach(s=>{
    const r = s.rosters[gender];
    if(!r) return;
    let tier;
    if(r.n < MIN_N) tier="lown";
    else {
      const q25 = quantile(r.points, 0.25);
      if(P >= r.pMed) tier="safety";
      else if(P >= q25) tier="match";
      else if(P >= q25 - REACH_PTS) tier="reach";
      else tier="far";
    }
    tiers[tier].push({s, r});
  });
  Object.values(tiers).forEach(a=>a.sort((x,y)=>y.r.pMed - x.r.pMed));

  const colors = {safety:"var(--safety)",match:"var(--match)",reach:"var(--reach)",far:"var(--far)",lown:"var(--far)"};
  let html = `<div class="note" style="background:#fdeeee;border-color:#f0c8c8">${t.disclaimer}</div>`;
  if(entries.length < 3) html += `<div class="note">${t.fewEv(entries.length)}</div>`;
  ["safety","match","reach","far","lown"].forEach(tier=>{
    const arr = tiers[tier];
    if(!arr.length) return;
    const label = tier==="lown" ? t.lowNTier : t.tiers[tier];
    const desc = tier==="lown" ? t.lowNDesc : t.tierDesc[tier];
    html += `<div class="tier-h"><span class="dot" style="background:${colors[tier]}"></span>${label}<span class="cnt">· ${arr.length} · ${desc}</span></div>`;
    arr.forEach(({s,r})=>{
      const beaten = r.points.filter(p=>P>=p).length;
      const lo=r.pMin, hi=r.pMax, span=Math.max(hi-lo,1);
      const clamp = v=>Math.max(2,Math.min(98, (v-lo)/span*96+2));
      const dots = r.points.map(p=>`<span class="pt" style="left:${clamp(p)}%"></span>`).join("");
      const mePos = clamp(Math.max(lo-REACH_PTS, Math.min(hi+10, P)));
      // per-event comparison for user's entered events
      let cmps = "";
      entries.slice(0,5).forEach(e=>{
        const scyEv = LCM_TO_SCY_EV[e.ev] || e.ev;
        const evd = r.events[scyEv];
        const meq = scyEquiv(e.ev, e.pts);
        if(!evd || !meq) return;
        const faster = meq.t <= evd.max;
        cmps += `<div class="evcmp">${scyEv} · ${t.evYou} <b>${fmtTime(meq.t)}</b> vs ${t.evRange} ${fmtTime(evd.min)}–${fmtTime(evd.max)} <span class="${faster?"ok":"no"}">${faster?"✓":"△"}</span></div>`;
      });
      if(cmps) cmps += `<div class="small" style="margin-top:4px">${t.evNote}</div>`;
      html += `<div class="school" style="border-left-color:${colors[tier]}">
        <div class="top"><span class="nm">${s.name}</span>
          <span class="badge ${s.div.toLowerCase()}">${s.div}</span>
          <span class="badge">${s.conf}</span>
          <span class="small">${t.roster(r.n)}${r.n<4?" · "+t.lowN:""}</span></div>
        <div class="pos">${t.pos(beaten, r.n)}</div>
        <div class="strip">${dots}<span class="me" style="left:${mePos}%"></span></div>
        <div class="striplbl"><span>${t.slowest} ${lo}</span><span style="color:var(--aqua);font-weight:700">▎${t.you} ${Math.round(P)}</span><span>${t.fastest} ${hi}</span></div>
        ${needLineHTML(s.name, myGroups)}
        ${cmps}</div>`;
    });
  });
  document.getElementById("tiers").innerHTML = html || `<div class="card">${t.noSchool}</div>`;
  document.getElementById("results").classList.remove("hide");
  document.getElementById("results").scrollIntoView({behavior:"smooth"});
}

fetch("stats.json").then(r=>r.json()).then(d=>{ STATS=d; renderOverview(); });
fetch("needs.json").then(r=>r.json()).then(d=>{ NEEDS=d; renderOverview(); }).catch(()=>{});
applyLang();
</script>
